name = "flow-tracker"
main = "src/index.ts"
compatibility_date = "2026-07-09"
compatibility_flags = ["nodejs_compat"]

# Attach the Worker to the tracker subdomain as a Custom Domain
# (auto-provisions the DNS record + managed SSL cert).
routes = [
  { pattern = "tracker.shravyalabs.com", custom_domain = true }
]

# Outbound transactional email (magic-link sign-in). Restricted to the verified destination.
send_email = [
  { name = "EMAIL", destination_address = "vsr19882026@gmail.com" }
]

[observability]
enabled = true

# Cron triggers (both dispatch to the `scheduled` handler; branch on event.cron):
#   0 3 * * *   — nightly D1 backup to R2 (see src/lib/backup.ts).
#   */10 * * * * — SAP reconcile tick (pull inbound changes / retry outbox).
[triggers]
crons = ["0 3 * * *", "*/10 * * * *"]

# D1 — primary relational store
[[d1_databases]]
binding = "DB"
database_name = "issues-prod"
database_id = "d32ac579-9af3-4212-b047-a1fabc098071"

# KV — cache namespace (id = production, preview_id = local/preview)
[[kv_namespaces]]
binding = "CACHE"
id = "e5d9e1cc197140d0a6b43358b4136809"
preview_id = "7ca69988803645bc8f7c3b135ba1491f"

# KV — reserved for search indexing (S3). Bound now so it lands with the schema
# choke-point; no code reads it yet.
[[kv_namespaces]]
binding = "SEARCH"
id = "34762e291f794b3195fb5e6af1048a1f"
preview_id = "e2296b656b0d43ca9dfad0af71629c74"

# R2 — issue attachments
[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "issue-attachments"

# Queues — SAP Cloud ALM ITSM sync (Session 5). Producers enqueue work; consumers
# drain it. sap-dlq is the dead-letter target for sap-outbound (no producer).
[[queues.producers]]
binding = "SAP_OUTBOUND"
queue = "sap-outbound"

[[queues.producers]]
binding = "SAP_INBOUND"
queue = "sap-inbound"

[[queues.consumers]]
queue = "sap-outbound"
max_retries = 5
dead_letter_queue = "sap-dlq"

[[queues.consumers]]
queue = "sap-inbound"
